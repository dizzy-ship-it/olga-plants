<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="My Plants" />
  <title>🌿 My Plants</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #3d7a4f;
      --green-light: #e8f5ee;
      --green-mid:   #a8d5b5;
      --mint:        #f0faf4;
      --cream:       #faf9f6;
      --text:        #1a1a1a;
      --text-soft:   #6b7280;
      --card:        #ffffff;
      --border:      #e8ede9;
      --shadow:      0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg:   0 8px 30px rgba(0,0,0,0.12);
      --yellow:      #f5c842;
      --yellow-bg:   #fffbeb;
      --orange:      #f59e42;
      --orange-bg:   #fff7ed;
      --red:         #e05252;
      --red-bg:      #fef2f2;
      --radius:      16px;
      --tab-h:       64px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      background: var(--green);
      color: white;
      padding: 52px 20px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 13px; opacity: 0.75; margin-top: 2px; }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--green);
      padding: 0 20px 14px;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 99;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
    }
    .tab-btn.active {
      background: white;
      color: var(--green);
    }

    /* ── Filter chips ───────────────────────────────────────── */
    .filter-wrap {
      padding: 14px 20px 6px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .filter-wrap::-webkit-scrollbar { display: none; }
    .chip {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-soft);
      margin-right: 6px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .chip.active {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    /* ── Plant cards ────────────────────────────────────────── */
    .cards {
      padding: 12px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .card:active { transform: scale(0.98); }

    .card-top {
      display: flex;
      align-items: center;
      padding: 16px;
      gap: 14px;
    }

    .plant-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sci {
      font-size: 12px;
      color: var(--text-soft);
      font-style: italic;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-badges {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.2px;
    }
    .badge-type  { background: var(--green-light); color: var(--green); }
    .badge-easy  { background: var(--green-light); color: var(--green); }
    .badge-medium{ background: var(--yellow-bg);   color: #b45309; }
    .badge-hard  { background: var(--red-bg);      color: var(--red); }
    .badge-hang  { background: #f0f0ff; color: #5b5bd6; }

    .chevron {
      color: var(--text-soft);
      font-size: 18px;
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .card.open .chevron { transform: rotate(180deg); }

    /* ── Expanded care details ──────────────────────────────── */
    .card-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .card.open .card-details { max-height: 900px; }

    .details-inner {
      border-top: 1px solid var(--border);
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .detail-icon {
      font-size: 16px;
      width: 22px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .detail-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1px;
    }
    .detail-val {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── Empty state ────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-soft);
    }
    .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* ── Section headers in wishlist ────────────────────────── */
    .section-header {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--green);
      padding: 12px 4px 4px;
    }

    /* ── Tab pane visibility ────────────────────────────────── */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Stats bar ──────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px 0;
    }
    .stat-card {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 700; color: var(--green); }
    .stat-lbl { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

    /* ── Search ──────────────────────────────────────────────── */
    .search-wrap {
      padding: 10px 16px 0;
    }
    .search-input {
      width: 100%;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      background: white;
      outline: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--green); }
    .search-input::placeholder { color: var(--text-soft); }

    /* ── FAB ────────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--green);
      color: white;
      font-size: 28px;
      border: none;
      box-shadow: 0 4px 16px rgba(61,122,79,0.45);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: transform 0.2s, background 0.2s;
    }
    .fab:active { transform: scale(0.92); background: #2e5e3b; }

    /* ── Modal overlay ──────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }

    .modal-sheet {
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      padding: 0 0 40px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 8px;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--border);
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-soft);
    }

    /* ── Form ───────────────────────────────────────────────── */
    .form-body { padding: 0 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 15px;
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--green);
    }
    .form-textarea { resize: none; height: 80px; }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--mint);
      border-radius: 12px;
      border: 1.5px solid var(--border);
    }
    .toggle-label { font-size: 14px; font-weight: 500; }
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 26px;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }

    /* Tab switcher in modal */
    .modal-tabs {
      display: flex;
      margin: 0 20px 16px;
      background: var(--mint);
      border-radius: 12px;
      padding: 3px;
    }
    .modal-tab {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-soft);
      transition: all 0.2s;
    }
    .modal-tab.active { background: white; color: var(--green); box-shadow: var(--shadow); }

    /* Save button */
    .btn-save {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-save:active { background: #2e5e3b; }

    /* Delete button on custom cards */
    .btn-delete {
      background: var(--red-bg);
      color: var(--red);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      margin-top: 4px;
    }

    /* ── Plant photos ────────────────────────────────────────── */
    .plant-photo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      object-fit: cover;
      display: block;
    }
    .photo-preview {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      max-height: 260px;
      display: block;
    }
    .btn-photo {
      background: var(--green-light);
      color: var(--green);
      border: 1.5px dashed var(--green-mid);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 14px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-photo:active { background: var(--green-mid); }
    .btn-photo-remove {
      background: var(--red-bg);
      color: var(--red);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Emoji picker row */
    .emoji-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .emoji-opt {
      font-size: 22px;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: var(--mint);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .emoji-opt.selected { border-color: var(--green); background: var(--green-light); }
  </style>
</head>
<body>

<header>
  <h1>🌿 My Plants</h1>
  <p>Olga's Plant Collection &nbsp;·&nbsp; <span id="app-version">v27</span></p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('collection')">🏠 My Collection</button>
  <button class="tab-btn"        onclick="switchTab('wishlist')">💚 Wishlist</button>
</div>

<!-- COLLECTION TAB -->
<div class="tab-pane active" id="tab-collection">
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="col-count">0</div>
      <div class="stat-lbl">Plants</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="wish-count">0</div>
      <div class="stat-lbl">On Wishlist</div>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="search" placeholder="🔍  Search plants..." id="col-search" oninput="renderCollection()" />
  </div>
  <div class="cards" id="collection-cards"></div>
</div>

<!-- WISHLIST TAB -->
<div class="tab-pane" id="tab-wishlist">
  <div class="filter-wrap" id="wishlist-filters"></div>
  <div class="search-wrap">
    <input class="search-input" type="search" placeholder="🔍  Search wishlist..." id="wish-search" oninput="renderWishlist()" />
  </div>
  <div class="cards" id="wishlist-cards"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="Add plant">＋</button>

<!-- Add Plant Modal -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">🌿 Add a Plant</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <!-- Modal tab: Collection / Wishlist -->
    <div class="modal-tabs">
      <button class="modal-tab active" id="mtab-col" onclick="setModalTab('collection')">🏠 To Collection</button>
      <button class="modal-tab"        id="mtab-wish" onclick="setModalTab('wishlist')">💚 To Wishlist</button>
    </div>

    <div class="form-body">
      <!-- Emoji picker -->
      <div class="form-group">
        <label class="form-label">Icon</label>
        <div class="emoji-row" id="emoji-picker">
          <span class="emoji-opt selected" data-emoji="🌿" onclick="pickEmoji(this)">🌿</span>
          <span class="emoji-opt" data-emoji="🌱" onclick="pickEmoji(this)">🌱</span>
          <span class="emoji-opt" data-emoji="🍃" onclick="pickEmoji(this)">🍃</span>
          <span class="emoji-opt" data-emoji="🌵" onclick="pickEmoji(this)">🌵</span>
          <span class="emoji-opt" data-emoji="🌸" onclick="pickEmoji(this)">🌸</span>
          <span class="emoji-opt" data-emoji="🌺" onclick="pickEmoji(this)">🌺</span>
          <span class="emoji-opt" data-emoji="🌴" onclick="pickEmoji(this)">🌴</span>
          <span class="emoji-opt" data-emoji="🪴" onclick="pickEmoji(this)">🪴</span>
          <span class="emoji-opt" data-emoji="🍀" onclick="pickEmoji(this)">🍀</span>
          <span class="emoji-opt" data-emoji="🌾" onclick="pickEmoji(this)">🌾</span>
          <span class="emoji-opt" data-emoji="💜" onclick="pickEmoji(this)">💜</span>
          <span class="emoji-opt" data-emoji="🤍" onclick="pickEmoji(this)">🤍</span>
          <span class="emoji-opt" data-emoji="🍓" onclick="pickEmoji(this)">🍓</span>
          <span class="emoji-opt" data-emoji="✨" onclick="pickEmoji(this)">✨</span>
          <span class="emoji-opt" data-emoji="🫧" onclick="pickEmoji(this)">🫧</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Plant Name *</label>
        <input class="form-input" id="f-name" type="text" placeholder="e.g. Monstera Thai Constellation" />
      </div>

      <div class="form-group">
        <label class="form-label">Scientific Name</label>
        <input class="form-input" id="f-sci" type="text" placeholder="e.g. Monstera deliciosa" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="f-type">
            <option>Aroid</option>
            <option>Begonia</option>
            <option>Cactus</option>
            <option>Calathea</option>
            <option>Foliage</option>
            <option>Hoya</option>
            <option>Peperomia</option>
            <option>Philodendron</option>
            <option>Pilea</option>
            <option>Scindapsus</option>
            <option>Statement</option>
            <option>Succulent</option>
            <option>Syngonium</option>
            <option>Tradescantia</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Care Level</label>
          <select class="form-select" id="f-care">
            <option>Very Easy</option>
            <option selected>Easy</option>
            <option>Easy–Medium</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
        </div>
      </div>

      <!-- Wishlist only: hanging toggle -->
      <div class="form-group" id="f-hanging-wrap">
        <div class="toggle-wrap">
          <span class="toggle-label">🪴 Good as a hanging plant?</span>
          <label class="toggle">
            <input type="checkbox" id="f-hanging" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Collection only: care fields -->
      <div id="f-care-fields">
        <div class="form-group">
          <label class="form-label">☀️ Light</label>
          <input class="form-input" id="f-light" type="text" placeholder="e.g. Bright indirect light" />
        </div>
        <div class="form-group">
          <label class="form-label">💧 Water</label>
          <input class="form-input" id="f-water" type="text" placeholder="e.g. Every 1–2 weeks" />
        </div>
        <div class="form-group">
          <label class="form-label">🌫️ Humidity</label>
          <input class="form-input" id="f-humidity" type="text" placeholder="e.g. Average (40–60%)" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">📏 Indoor Size</label>
        <input class="form-input" id="f-size" type="text" placeholder="e.g. 3–5 ft tall" />
      </div>

      <div class="form-group">
        <label class="form-label">📝 Notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Any care tips, where you got it, special notes..."></textarea>
      </div>

      <button class="btn-save" onclick="savePlant()">Add Plant 🌿</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────────────────────
const collection = [
  {
    name: "White Bird of Paradise",
    sci:  "Strelitzia nicolai",
    type: "Statement",
    icon: "🌴",
    care: {
      light:    "Bright indirect to direct sunlight",
      water:    "Every 1–2 weeks — let the top 2\" dry out first",
      humidity: "Average (40–60%)",
      size:     "6–10 ft tall indoors",
      notes:    "Grows large — make sure it has space! Wipe leaves occasionally to keep them glossy."
    }
  },
  {
    name: "Janet Craig Dracaena",
    sci:  "Dracaena fragrans 'Janet Craig'",
    type: "Foliage",
    icon: "🌿",
    care: {
      light:    "Low to bright indirect light — very adaptable",
      water:    "Every 2–3 weeks — let soil dry out well between waterings",

// ─────────────────────────────────────────────────────────────
//  LOCALSTORAGE — custom plants
// ─────────────────────────────────────────────────────────────
function loadCustom(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
}
function saveCustom(key, arr) {
  localStorage.setItem(key, JSON.stringify(arr));
}

// Merge built-in + custom (custom plants have _custom: true)
let customCollection = loadCustom('custom_collection');
let customWishlist   = loadCustom('custom_wishlist');

// State
let activeType   = "All";
let modalTarget  = "collection"; // "collection" or "wishlist"
let selectedEmoji = "🌿";

// ─────────────────────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  resetForm();
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function setModalTab(tab) {
  modalTarget = tab;
  document.getElementById('mtab-col').classList.toggle('active',  tab === 'collection');
  document.getElementById('mtab-wish').classList.toggle('active', tab === 'wishlist');
  document.getElementById('f-care-fields').style.display  = tab === 'collection' ? 'block' : 'none';
  document.getElementById('f-hanging-wrap').style.display = tab === 'wishlist'   ? 'block' : 'none';
}
function pickEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedEmoji = el.dataset.emoji;
}
function resetForm() {
  ['f-name','f-sci','f-light','f-water','f-humidity','f-size','f-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-hanging').checked = false;
  document.getElementById('f-type').value  = 'Other';
  document.getElementById('f-care').value  = 'Easy';
  selectedEmoji = '🌿';
  document.querySelectorAll('.emoji-opt').forEach(e => {
    e.classList.toggle('selected', e.dataset.emoji === '🌿');
  });
  setModalTab('collection');
}
function savePlant() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }

  if (modalTarget === 'collection') {
    const plant = {
      name, _custom: true,
      sci:  document.getElementById('f-sci').value.trim() || name,
      type: document.getElementById('f-type').value,
      icon: selectedEmoji,
      care: {
        light:    document.getElementById('f-light').value.trim()    || '—',
        water:    document.getElementById('f-water').value.trim()    || '—',
        humidity: document.getElementById('f-humidity').value.trim() || '—',
        size:     document.getElementById('f-size').value.trim()     || '—',
        notes:    document.getElementById('f-notes').value.trim()    || '—',
      }
    };
    customCollection.push(plant);
    saveCustom('custom_collection', customCollection);
    collection.push(plant);
    renderCollection();
  } else {
    const plant = {
      name, _custom: true,
      sci:     document.getElementById('f-sci').value.trim() || name,
      type:    document.getElementById('f-type').value,
      icon:    selectedEmoji,
      hanging: document.getElementById('f-hanging').checked,
      care:    document.getElementById('f-care').value,
      size:    document.getElementById('f-size').value.trim() || '',
      notes:   document.getElementById('f-notes').value.trim() || '—',
    };
    customWishlist.push(plant);
    saveCustom('custom_wishlist', customWishlist);
    wishlist.push(plant);
    buildFilters();
    renderWishlist();
  }
  updateStats();
  closeModal();
}
function deletePlant(list, key, idx, e) {
  e.stopPropagation();
  if (!confirm('Remove this plant?')) return;
  // Find and remove by matching _custom index in custom array
  const customArr = list === 'collection' ? customCollection : customWishlist;
  const mainArr   = list === 'collection' ? collection : wishlist;
  const customIdx = mainArr.findIndex((p, i) => p._custom && i === idx);
  if (customIdx > -1) {
    mainArr.splice(customIdx, 1);
    // Rebuild custom arrays
    if (list === 'collection') {
      customCollection = collection.filter(p => p._custom);
      saveCustom('custom_collection', customCollection);
      renderCollection();
    } else {
      customWishlist = wishlist.filter(p => p._custom);
      saveCustom('custom_wishlist', customWishlist);
      buildFilters(); renderWishlist();
    }
    updateStats();
  }
}

// ─────────────────────────────────────────────────────────────
//  PHOTOS — stored in localStorage as resized base64 JPEGs
// ─────────────────────────────────────────────────────────────
function plantKey(name) {
  return 'photo_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_');
}
function loadPhoto(name) {
  return localStorage.getItem(plantKey(name));
}
function savePhoto(name, dataURL) {
  try {
    localStorage.setItem(plantKey(name), dataURL);
  } catch(e) {
    alert('Storage full — try a lower-quality photo or remove an old one.');
  }
}
function removePhotoAndRender(colIdx, e) {
  e.stopPropagation();
  const plant = collection[colIdx];
  if (!plant) return;
  localStorage.removeItem(plantKey(plant.name));
  renderCollection();
}
function triggerPhotoUpload(colIdx, e) {
  e.stopPropagation();
  const plant = collection[colIdx];
  if (!plant) return;
  const input = document.createElement('input');
  input.type   = 'file';
  input.accept = 'image/*';
  input.onchange = function() {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      resizeImage(ev.target.result, 1000, function(resized) {
        savePhoto(plant.name, resized);
        renderCollection();
      });
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
function resizeImage(dataURL, maxPx, callback) {
  const img = new Image();
  img.onload = function() {
    let w = img.width, h = img.height;
    if (w > maxPx || h > maxPx) {
      if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
      else        { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.82));
  };
  img.src = dataURL;
}

// ─────────────────────────────────────────────────────────────
//  CARE LEVEL → badge class
// ─────────────────────────────────────────────────────────────
function careClass(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l.includes('very easy') || l === 'easy') return 'badge-easy';
  if (l.includes('medium')) return 'badge-medium';
  if (l.includes('hard')) return 'badge-hard';
  return 'badge-easy';
}

// ─────────────────────────────────────────────────────────────
//  COLLECTION
// ─────────────────────────────────────────────────────────────
function renderCollection() {
  const q = (document.getElementById('col-search').value || '').toLowerCase();
  const el = document.getElementById('collection-cards');
  const filtered = collection.filter(p =>
    !q || p.name.toLowerCase().includes(q) || p.sci.toLowerCase().includes(q)
  );
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No plants found</p></div>`;
    return;
  }
  el.innerHTML = filtered.map((p, i) => {
    const colIdx = collection.indexOf(p);
    const photo  = loadPhoto(p.name);
    const iconHTML = photo
      ? `<div class="plant-icon" style="background:none;padding:0;overflow:hidden;"><img src="${photo}" class="plant-photo" /></div>`
      : `<div class="plant-icon">${p.icon}</div>`;
    const photoSection = photo ? `
      <div class="detail-row" style="flex-direction:column;gap:8px;">
        <img src="${photo}" class="photo-preview" onclick="event.stopPropagation()" />
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn-photo" style="flex:1;" onclick="triggerPhotoUpload(${colIdx},event)">📷 Change Photo</button>
          <button class="btn-photo-remove" onclick="removePhotoAndRender(${colIdx},event)">✕ Remove</button>
        </div>
      </div>
    ` : `
      <div class="detail-row">
        <button class="btn-photo" onclick="triggerPhotoUpload(${colIdx},event)">📷 Add a Photo of Your Plant</button>
      </div>
    `;
    return `
    <div class="card" id="cc${i}" onclick="toggleCard('cc${i}')">
      <div class="card-top">
        ${iconHTML}
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-sci">${p.sci}</div>
          <div class="card-badges">
            <span class="badge badge-type">${p.type}</span>
            ${p._custom ? `<button class="btn-delete" onclick="deletePlant('collection',null,${colIdx},event)">✕ Remove</button>` : ''}
          </div>
        </div>
        <span class="chevron">⌄</span>
      </div>
      <div class="card-details">
        <div class="details-inner">
          ${photoSection}
          <div class="detail-row">
            <span class="detail-icon">☀️</span>
            <div>
              <div class="detail-label">Light</div>
              <div class="detail-val">${p.care.light}</div>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-icon">💧</span>
            <div>
              <div class="detail-label">Water</div>
              <div class="detail-val">${p.care.water}</div>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-icon">🌫️</span>
            <div>
              <div class="detail-label">Humidity</div>
              <div class="detail-val">${p.care.humidity}</div>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-icon">📏</span>
            <div>
              <div class="detail-label">Indoor Size</div>
              <div class="detail-val">${p.care.size || '—'}</div>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-icon">📝</span>
            <div>
              <div class="detail-label">Notes</div>
              <div class="detail-val">${p.care.notes}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `}).join('');
}

// ─────────────────────────────────────────────────────────────
//  WISHLIST
// ─────────────────────────────────────────────────────────────
function buildFilters() {
  const types = ['All', ...new Set(wishlist.map(p => p.type))];
  const wrap = document.getElementById('wishlist-filters');
  wrap.innerHTML = types.map(t => `
    <span class="chip ${t === activeType ? 'active' : ''}" onclick="setFilter('${t}')">${t}</span>
  `).join('');
}

function setFilter(type) {
  activeType = type;
  buildFilters();
  renderWishlist();
}

function renderWishlist() {
  const q = (document.getElementById('wish-search').value || '').toLowerCase();
  const el = document.getElementById('wishlist-cards');
  let filtered = wishlist.filter(p =>
    (activeType === 'All' || p.type === activeType) &&
    (!q || p.name.toLowerCase().includes(q) || p.sci.toLowerCase().includes(q) || p.type.toLowerCase().includes(q))
  );

  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><p>Nothing here yet!</p></div>`;
    return;
  }

  // Group by type if not filtered
  if (activeType === 'All' && !q) {
    const groups = {};
    filtered.forEach(p => { (groups[p.type] = groups[p.type] || []).push(p); });
    let html = '';
    for (const [type, plants] of Object.entries(groups)) {
      html += `<div class="section-header">${type}</div>`;
      html += plants.map((p, i) => wishCard(p, `wc${type}${i}`)).join('');
    }
    el.innerHTML = html;
  } else {
    el.innerHTML = filtered.map((p, i) => wishCard(p, `wf${i}`)).join('');
  }
}

function wishCard(p, id) {
  return `
    <div class="card" id="${id}" onclick="toggleCard('${id}')">
      <div class="card-top">
        <div class="plant-icon">${p.icon}</div>
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-sci">${p.sci}</div>
          <div class="card-badges">
            <span class="badge badge-type">${p.type}</span>
            <span class="badge ${careClass(p.care)}">${p.care}</span>
            ${p.hanging ? '<span class="badge badge-hang">🪴 Hanging</span>' : ''}
            ${p._custom ? `<button class="btn-delete" onclick="deletePlant('wishlist',null,${wishlist.indexOf(p)},event)">✕ Remove</button>` : ''}
          </div>
        </div>
        <span class="chevron">⌄</span>
      </div>
      <div class="card-details">
        <div class="details-inner">
          ${p.size ? `
          <div class="detail-row">
            <span class="detail-icon">📏</span>
            <div>
              <div class="detail-label">Indoor Size</div>
              <div class="detail-val">${p.size}</div>
            </div>
          </div>` : ''}
          <div class="detail-row">
            <span class="detail-icon">📝</span>
            <div>
              <div class="detail-label">Notes</div>
              <div class="detail-val">${p.notes}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
//  TOGGLE CARD
// ─────────────────────────────────────────────────────────────
function toggleCard(id) {
  const card = document.getElementById(id);
  const wasOpen = card.classList.contains('open');
  // close all
  document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) card.classList.add('open');
}

// ─────────────────────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('col-count').textContent  = collection.length;
  document.getElementById('wish-count').textContent = wishlist.length;
}

// ─────────────────────────────────────────────────────────────
//  INIT — merge saved custom plants into arrays
// ─────────────────────────────────────────────────────────────
customCollection.forEach(p => collection.push(p));
customWishlist.forEach(p => wishlist.push(p));

updateStats();
renderCollection();
buildFilters();
renderWishlist();
setModalTab('collection');

// Register service worker for PWA install support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/olga-plants/sw.js').catch(() => {});
}
</script>
</body>
</html>
